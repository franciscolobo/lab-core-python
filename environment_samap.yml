name: samap
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.9          # numba 0.56.x requires python <3.10
  - numpy=1.24.4        # SAMap/numba ABI; must stay <2 and <1.25 for numba 0.56
  - scipy=1.12.0        # tested against this; later versions may conflict with numba
  - pandas>=2.0
  - matplotlib-base
  - seaborn
  - h5py
  - hdf5
  - python-igraph
  - leidenalg
  - networkx
  - setuptools
  - ipykernel
  - ipywidgets
  - jupyterlab
  - bokeh=2.4.3         # holoviews-samap requires bokeh 2.x; 3.x breaks the API
  - holoviews=1.17.1    # pinned to match holoviews-samap==1.0.1 compatibility
  - panel=0.14.4        # holoviews 1.17.x requires panel 0.14.x
  - param=1.13.0        # panel 0.14.x requires param 1.13.x
  - pynndescent          # UMAP dependency
  - pip
  - pip:
      - samap==1.0.15
      - sam-algorithm==1.0.2
      - holoviews-samap==1.0.1
      - anndata==0.10.8
      - scanpy==1.9.3
      - numba==0.56.3    # must match numpy 1.24.x; do not upgrade independently
      - llvmlite==0.39.1 # paired with numba 0.56.3
      - umap-learn==0.5.6
      - hnswlib==0.7.0   # required by sam-algorithm
      - harmonypy
      - scikit-learn
